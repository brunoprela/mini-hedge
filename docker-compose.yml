services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    profiles: ["core"]
    environment:
      POSTGRES_USER: minihedge
      POSTGRES_PASSWORD: minihedge
      POSTGRES_DB: minihedge
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: postgres -c wal_level=logical -c max_replication_slots=4 -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minihedge"]
      interval: 5s
      timeout: 3s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    profiles: ["core"]
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://minihedge:minihedge@postgres:5432/minihedge"
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    profiles: ["core"]
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://minihedge:minihedge@postgres:5432/minihedge"
      OPENFGA_PLAYGROUND_ENABLED: "true"
      # Check API caching — trades freshness for latency
      OPENFGA_CHECK_QUERY_CACHE_ENABLED: "true"
      OPENFGA_CHECK_QUERY_CACHE_TTL: "30s"
      # Connection pool tuning
      OPENFGA_DATASTORE_MAX_OPEN_CONNS: "20"
      OPENFGA_DATASTORE_MIN_OPEN_CONNS: "5"
      # Limit expensive queries
      OPENFGA_LIST_OBJECTS_MAX_RESULTS: "100"
    ports:
      - "8080:8080"
      - "3001:3000"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    profiles: ["core"]
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/minihedge"
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: minihedge
      KC_DB_PASSWORD: minihedge
      KC_HTTP_PORT: "8180"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/ops-realm-export.json:/opt/keycloak/data/import/ops-realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    profiles: ["core"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    profiles: ["core"]
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: minihedge-connect
      CONFIG_STORAGE_TOPIC: _connect-configs
      OFFSET_STORAGE_TOPIC: _connect-offsets
      STATUS_STORAGE_TOPIC: _connect-status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.57
    profiles: ["core"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  redis:
    image: redis:7-alpine
    profiles: ["core"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["core"]
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["core"]
    ports:
      - "3200:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Mock Exchange — external vendor simulation (own Kafka cluster)
  # ---------------------------------------------------------------------------

  mock-exchange-kafka:
    image: confluentinc/cp-kafka:7.7.0
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9192
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://mock-exchange-kafka:29092,EXTERNAL://localhost:9192
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@mock-exchange-kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: TW9ja0V4Y2hhbmdlS2Fma2E
    ports:
      - "9192:9192"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mock-exchange-sr:
    image: confluentinc/cp-schema-registry:7.7.0
    profiles: ["core"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: mock-exchange-sr
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: mock-exchange-kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8181
    ports:
      - "8181:8181"
    depends_on:
      mock-exchange-kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8181/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mock-exchange:
    build:
      context: ./mock-exchange
    profiles: ["core"]
    command: >
      sh -c "uv sync --frozen 2>/dev/null || uv sync && uv run uvicorn mock_exchange.main:app
      --host 0.0.0.0
      --port 8100
      --reload
      --reload-dir mock_exchange"
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP_SERVERS: "mock-exchange-kafka:29092"
      KAFKA_SCHEMA_REGISTRY_URL: "http://mock-exchange-sr:8181"
      SIMULATOR_ENABLED: "true"
      SIMULATOR_INTERVAL_MS: "1000"
      LOG_LEVEL: "DEBUG"
    ports:
      - "8100:8100"
    volumes:
      - ./mock-exchange:/app
      - mock-exchange-venv:/app/.venv
    depends_on:
      mock-exchange-kafka:
        condition: service_healthy
      mock-exchange-sr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build: .
    profiles: ["core"]
    command: >
      sh -c "uv sync --frozen && uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql+asyncpg://minihedge:minihedge@postgres:5432/minihedge"
      FGA_API_URL: "http://openfga:8080"
      FGA_STORE_NAME: "minihedge"
      FGA_ENABLED: "true"
      KEYCLOAK_URL: "http://keycloak:8180"
      KEYCLOAK_BROWSER_URL: "http://localhost:8180"
      KEYCLOAK_REALM: "minihedge"
      KEYCLOAK_CLIENT_ID: "mini-hedge-ui"
      KEYCLOAK_OPS_REALM: "minihedge-ops"
      KEYCLOAK_OPS_CLIENT_ID: "mini-hedge-ops-ui"
      APP_ENV: "local"
      LOG_LEVEL: "DEBUG"
      MOCK_EXCHANGE_URL: "http://mock-exchange:8100"
      MOCK_EXCHANGE_KAFKA_BOOTSTRAP_SERVERS: "mock-exchange-kafka:29092"
      MARKET_DATA_SOURCE: "mock-exchange"
      BROKER_ADAPTER: "mock-exchange"
      REFERENCE_DATA_SOURCE: "mock-exchange"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_ENABLED: "true"
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_SERVICE_NAME: "minihedge"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app-venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      mock-exchange:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    profiles: ["frontend"]
    command: pnpm dev --hostname 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "minihedge-ui-dev-secret-change-in-production"
      AUTH_KEYCLOAK_ID: "mini-hedge-ui"
      AUTH_KEYCLOAK_ISSUER: "http://keycloak:8180/realms/minihedge"
      API_URL: "http://app:8000"
      NEXT_PUBLIC_KEYCLOAK_ISSUER: "http://localhost:8180/realms/minihedge"
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "mini-hedge-ui"
    volumes:
      - ./ui/src:/app/src
      - ./ui/public:/app/public
      - ui-node-modules:/app/node_modules
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ops-ui:
    build:
      context: ./ops-ui
      dockerfile: Dockerfile.dev
    profiles: ["frontend"]
    command: pnpm dev --hostname 0.0.0.0
    ports:
      - "3100:3100"
    environment:
      NEXTAUTH_URL: "http://localhost:3100"
      NEXTAUTH_SECRET: "minihedge-ops-dev-secret-change-in-production"
      AUTH_KEYCLOAK_ID: "mini-hedge-ops-ui"
      AUTH_KEYCLOAK_ISSUER: "http://keycloak:8180/realms/minihedge-ops"
      API_URL: "http://app:8000"
      NEXT_PUBLIC_KEYCLOAK_ISSUER: "http://localhost:8180/realms/minihedge-ops"
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "mini-hedge-ops-ui"
    volumes:
      - ./ops-ui/src:/app/src
      - ./ops-ui/public:/app/public
      - ops-ui-node-modules:/app/node_modules
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  app-venv:
  mock-exchange-venv:
  ui-node-modules:
  ops-ui-node-modules:
