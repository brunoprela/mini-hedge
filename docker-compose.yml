services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    profiles: ["core"]
    environment:
      POSTGRES_USER: minihedge
      POSTGRES_PASSWORD: minihedge
      POSTGRES_DB: minihedge
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minihedge"]
      interval: 5s
      timeout: 3s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    profiles: ["core"]
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://minihedge:minihedge@postgres:5432/minihedge"
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    profiles: ["core"]
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://minihedge:minihedge@postgres:5432/minihedge"
      OPENFGA_PLAYGROUND_ENABLED: "true"
    ports:
      - "8080:8080"
      - "3000:3000"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    profiles: ["core"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    profiles: ["app"]
    command: >
      sh -c "uv sync --frozen && uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql+asyncpg://minihedge:minihedge@postgres:5432/minihedge"
      FGA_API_URL: "http://openfga:8080"
      FGA_STORE_NAME: "minihedge"
      FGA_ENABLED: "true"
      APP_ENV: "local"
      LOG_LEVEL: "DEBUG"
      SIMULATOR_ENABLED: "true"
      SIMULATOR_INTERVAL_MS: "1000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app-venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  app-venv:
