services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    profiles: ["core"]
    environment:
      POSTGRES_USER: minihedge
      POSTGRES_PASSWORD: minihedge
      POSTGRES_DB: minihedge
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minihedge"]
      interval: 5s
      timeout: 3s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    profiles: ["core"]
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://minihedge:minihedge@postgres:5432/minihedge"
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    profiles: ["core"]
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://minihedge:minihedge@postgres:5432/minihedge"
      OPENFGA_PLAYGROUND_ENABLED: "true"
    ports:
      - "8080:8080"
      - "3001:3000"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    profiles: ["core"]
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/minihedge"
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: minihedge
      KC_DB_PASSWORD: minihedge
      KC_HTTP_PORT: "8180"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ./keycloak/ops-realm-export.json:/opt/keycloak/data/import/ops-realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    profiles: ["core"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    profiles: ["core"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles: ["core"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    profiles: ["core"]
    command: >
      sh -c "uv sync --frozen && uv run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir app"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: "postgresql+asyncpg://minihedge:minihedge@postgres:5432/minihedge"
      FGA_API_URL: "http://openfga:8080"
      FGA_STORE_NAME: "minihedge"
      FGA_ENABLED: "true"
      KEYCLOAK_URL: "http://keycloak:8180"
      KEYCLOAK_BROWSER_URL: "http://localhost:8180"
      KEYCLOAK_REALM: "minihedge"
      KEYCLOAK_CLIENT_ID: "mini-hedge-ui"
      KEYCLOAK_OPS_REALM: "minihedge-ops"
      KEYCLOAK_OPS_CLIENT_ID: "mini-hedge-ops-ui"
      APP_ENV: "local"
      LOG_LEVEL: "DEBUG"
      SIMULATOR_ENABLED: "true"
      SIMULATOR_INTERVAL_MS: "1000"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      REDIS_URL: "redis://redis:6379/0"
      REDIS_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app-venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    profiles: ["core"]
    command: pnpm dev --hostname 0.0.0.0
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "minihedge-ui-dev-secret-change-in-production"
      AUTH_KEYCLOAK_ID: "mini-hedge-ui"
      AUTH_KEYCLOAK_ISSUER: "http://keycloak:8180/realms/minihedge"
      API_URL: "http://app:8000"
      NEXT_PUBLIC_KEYCLOAK_ISSUER: "http://localhost:8180/realms/minihedge"
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "mini-hedge-ui"
    volumes:
      - ./ui/src:/app/src
      - ./ui/public:/app/public
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  ops-ui:
    build:
      context: ./ops-ui
      dockerfile: Dockerfile.dev
    profiles: ["core"]
    command: pnpm dev --hostname 0.0.0.0
    ports:
      - "3100:3100"
    environment:
      NEXTAUTH_URL: "http://localhost:3100"
      NEXTAUTH_SECRET: "minihedge-ops-dev-secret-change-in-production"
      AUTH_KEYCLOAK_ID: "mini-hedge-ops-ui"
      AUTH_KEYCLOAK_ISSUER: "http://keycloak:8180/realms/minihedge-ops"
      API_URL: "http://app:8000"
      NEXT_PUBLIC_KEYCLOAK_ISSUER: "http://localhost:8180/realms/minihedge-ops"
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "mini-hedge-ops-ui"
    volumes:
      - ./ops-ui/src:/app/src
      - ./ops-ui/public:/app/public
    depends_on:
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  app-venv:
