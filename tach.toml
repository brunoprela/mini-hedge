exact = true
exclude = ["tests"]
source_roots = ["."]

[[modules]]
path = "app.shared"
depends_on = []

[[modules]]
path = "app.modules.platform"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.security_master"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.market_data"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.positions"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.realtime"
depends_on = ["app.shared"]

[[modules]]
path = "app.middleware"
depends_on = ["app.shared"]

[[modules]]
path = "app.exception_handlers"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.exposure"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.compliance"
depends_on = ["app.shared"]

[[modules]]
path = "app.modules.orders"
depends_on = ["app.shared", "app.modules.compliance"]

[[modules]]
path = "app.setup"
depends_on = ["app.shared", "app.modules.platform", "app.modules.security_master", "app.modules.market_data", "app.modules.positions", "app.modules.exposure", "app.modules.compliance", "app.modules.orders"]
