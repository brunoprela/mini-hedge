[alembic]
# Default section — not used directly; run with: alembic -n <context> upgrade head
script_location = %(here)s/UNUSED

[platform]
script_location = app/modules/platform/migrations
version_locations = app/modules/platform/migrations/versions

[security_master]
script_location = app/modules/security_master/migrations
version_locations = app/modules/security_master/migrations/versions

[market_data]
script_location = app/modules/market_data/migrations
version_locations = app/modules/market_data/migrations/versions

[positions]
script_location = app/modules/positions/migrations
version_locations = app/modules/positions/migrations/versions

[exposure]
script_location = app/modules/exposure/migrations
version_locations = app/modules/exposure/migrations/versions

[compliance]
script_location = app/modules/compliance/migrations
version_locations = app/modules/compliance/migrations/versions

[orders]
script_location = app/modules/orders/migrations
version_locations = app/modules/orders/migrations/versions

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
