global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: minihedge
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: immudb
    static_configs:
      - targets: ["immudb:9497"]
    metrics_path: /metrics
