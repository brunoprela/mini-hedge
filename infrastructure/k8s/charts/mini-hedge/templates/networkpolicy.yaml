{{- if .Values.networkPolicy.enabled -}}
# Baseline deny-by-default. Specific allow policies should be layered on
# per namespace via a separate chart or manifest set — the platform owns the
# backplane, not this chart.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mini-hedge.fullname" . }}-default-deny
  labels:
    {{- include "mini-hedge.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # Empty rules arrays = deny all. Real allow-lists live in companion policies.
---
# Allow the backend pods to talk to DNS (cluster-scoped).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mini-hedge.fullname" . }}-allow-dns
  labels:
    {{- include "mini-hedge.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mini-hedge.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
