{{- if and .Values.backend.enabled .Values.backend.ingress.enabled -}}
{{- if .Values.backend.ingress.useIngressRoute -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "mini-hedge.backend.fullname" . }}
  labels:
    {{- include "mini-hedge.backend.labels" . | nindent 4 }}
  {{- with .Values.backend.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.backend.ingress.host }}`)
      kind: Rule
      services:
        - name: {{ include "mini-hedge.backend.fullname" . }}
          port: {{ .Values.backend.service.port }}
  {{- if .Values.backend.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.backend.ingress.tls.secretName }}
  {{- end }}
{{- else -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mini-hedge.backend.fullname" . }}
  labels:
    {{- include "mini-hedge.backend.labels" . | nindent 4 }}
  {{- with .Values.backend.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.backend.ingress.className }}
  {{- if .Values.backend.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.backend.ingress.host }}
      secretName: {{ .Values.backend.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.backend.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "mini-hedge.backend.fullname" . }}
                port:
                  number: {{ .Values.backend.service.port }}
{{- end }}
{{- end }}
