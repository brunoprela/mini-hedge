{{- /*
Optional: render an external-secrets.io ExternalSecret when enabled.
Otherwise, the deployment references `.Values.backend.secrets.appSecretName`
which must be provisioned separately (SealedSecrets / sops / manual kubectl).

Do NOT commit real secrets to values files — see values-production.yaml.example.
*/ -}}
{{- if and .Values.backend.enabled .Values.backend.secrets.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.backend.secrets.appSecretName }}
  labels:
    {{- include "mini-hedge.backend.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.backend.secrets.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: {{ .Values.backend.secrets.externalSecret.secretStoreRef.kind }}
    name: {{ .Values.backend.secrets.externalSecret.secretStoreRef.name }}
  target:
    name: {{ .Values.backend.secrets.appSecretName }}
    creationPolicy: Owner
  {{- with .Values.backend.secrets.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
